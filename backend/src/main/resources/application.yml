server:
  port: 8280
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: []
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:110.42.225.206}:${MYSQL_PORT:3308}/smart_agriculture?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:0p-0p-0p-}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池基本配置
      minimum-idle: 5
      maximum-pool-size: 20
      pool-name: SmartAgHikariCP
      
      # 防止连接超时关闭的关键配置
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      
      # 连接有效性测试配置（重要！）
      connection-test-query: SELECT 1
      validation-timeout: 5000
      
      # 连接初始化SQL
      connection-init-sql: SET NAMES utf8mb4
  sql:
    init:
      mode: never
  redis:
    host: ${REDIS_HOST:110.42.225.206}
    port: ${REDIS_PORT:6379}
    database: 4
    password: 123456

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.weiming.smartag.entity

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
  client-id: smart-agriculture-backend
  username: ${MQTT_USER:admin}
  password: ${MQTT_PASS:public}

# 虫情API配置
insect:
  api:
    base-url: http://182.40.36.93:8900
#    appName: Spore
    appName: Insects
    username: ft202603010
    password: ft202603010
  sync:
    # 同步周期（分钟）
    interval: 30


smartag:
  config:
    menu-model-path: /data/projects/2026/smartAgriculture/APP/config/menu-model-config.json

# 外部 IoT 设备平台（水位计/排水阀/摄像头）
#
# iot.platform.base-url / token ：对接外部 IoT 平台的基础地址与鉴权
# iot.camera.farms[i]          ：每个农场一份配置
#   .name                       ：菜单里显示的农场名（如"维明农场"/"红耕农场"）
#                                 匹配规则：去空格 + 大小写不敏感 + 宽松包含
#   .clientId                   ：device_push_data 表中对应农场的 client_id（用于
#                                 环境/土壤/气象数据查询，写对才能拿到正确数据）
#   .stationName                ：IoT listAllDevices 里的 station_name 关键字（用
#                                 于过滤排水阀/水位计；可写一段子串）
#   .ids                        ：该农场下的摄像头 deviceId 列表
iot:
  platform:
    base-url: https://hualin.xyune.com:8443/api/iot/manage/api
    token: BCACAFFC658149958B6401A3F0179281
    connect-timeout: 15000
    read-timeout: 15000
  camera:
    farms:
      - name: 维明农场
        clientId: 2604073202TXD-01
        stationName: 老叶维明农田
        ids:
          - "2067169374367645696"
      - name: 红耕农场
        clientId: 2604073202TXD-02
        stationName: 根思金禾农田
        ids:
          - "2067194219855872000"
