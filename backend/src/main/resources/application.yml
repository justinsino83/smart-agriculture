server:
  port: 8080
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: []
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/smart_agriculture?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 0

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.weiming.smartag.entity

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
  client-id: smart-agriculture-backend
  username: ${MQTT_USER:admin}
  password: ${MQTT_PASS:public}

# 虫情API配置
insect:
  api:
    base-url: http://182.40.36.93:8900
    appName: Spore
    username: ktdz
    password: ktdz
  sync:
    # 同步周期（分钟）
    interval: 30
