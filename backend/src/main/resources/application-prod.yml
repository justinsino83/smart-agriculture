server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: smart-agriculture
  datasource:
    url: jdbc:mysql://localhost:3306/smart_agriculture?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: SmartAgHikariCP

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.weiming.smartag.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  is-print: false

mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
  client-id: smart-agriculture-backend-prod
  username: ${MQTT_USER:admin}
  password: ${MQTT_PASS:public}

logging:
  level:
    com.weiming.smartag: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 外部 IoT 设备平台（水位计/排水阀/摄像头）
#
# iot.platform.base-url / token ：对接外部 IoT 平台的基础地址与鉴权
# iot.camera.farms[i]          ：每个农场一份配置
#   .name                       ：菜单里显示的农场名（如"维明农场"/"红耕农场"）
#   .clientId                   ：device_push_data 表中对应农场的 client_id
#   .stationName                ：IoT listAllDevices 里的 station_name 关键字
#   .ids                        ：该农场下的摄像头 deviceId 列表
iot:
  platform:
    base-url: https://hualin.xyune.com:8443/api/iot/manage/api
    token: BCACAFFC658149958B6401A3F0179281
    connect-timeout: 15000
    read-timeout: 15000
  camera:
    farms:
      - name: 维明农场
        clientId: 2604073202TXD-01
        stationName: 老叶维明农田
        ids:
          - "2067169374367645696"
      - name: 红耕农场
        clientId: 2604073202TXD-02
        stationName: 根思金禾农田
        ids:
          - "2067194219855872000"
